<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClinixAI Services | AI Pharmacovigilance Solutions, Consulting & Training</title>
<meta name="description" content="ClinixAI services for Pharma, CRO, Biotech and Life Sciences teams: AI-powered Pharmacovigilance solutions, consulting, implementation support and professional training.">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--ink:#071a34;
--navy:#0b2447;
--blue:#1f78ff;
--teal:#16a3a3;
--mint:#e8f8f6;
--paper:#ffffff;
--soft:#f5f8fc;
--line:#dce5f2;
--text:#1b2330;
--muted:#5d6b7c;
}
html{scroll-behavior:smooth}
body{background:var(--soft);color:var(--text);font-family:Arial,Helvetica,sans-serif;line-height:1.65}
a{color:inherit}
nav{background:var(--ink);position:sticky;top:0;z-index:20;box-shadow:0 2px 14px rgba(0,0,0,.16)}
.nav{align-items:center;display:flex;justify-content:space-between;margin:auto;max-width:1220px;padding:18px 22px}
.logo{color:#fff;font-size:30px;font-weight:800;letter-spacing:.2px;text-decoration:none}
.menu{align-items:center;display:flex;gap:22px}
.menu a{color:#fff;font-size:15px;text-decoration:none}
.menu a:hover{color:#72c8ff}
.nav-cta{background:var(--blue);border-radius:8px;color:#fff!important;font-weight:700;padding:10px 16px}
.hero{background:linear-gradient(135deg,#071a34 0%,#103d75 60%,#0f6b85 100%);color:#fff}
.hero-inner{margin:auto;max-width:1220px;padding:92px 22px 72px}
.eyebrow{color:#bcecff;font-size:14px;font-weight:800;letter-spacing:.12em;margin-bottom:16px;text-transform:uppercase}
.hero h1{font-size:58px;line-height:1.08;max-width:980px}
.hero p{font-size:21px;margin-top:22px;max-width:860px;opacity:.95}
.hero-actions{display:flex;flex-wrap:wrap;gap:14px;margin-top:34px}
.btn{border-radius:8px;display:inline-flex;font-weight:800;justify-content:center;min-width:170px;padding:14px 20px;text-decoration:none}
.btn-primary{background:#fff;color:var(--ink)}
.btn-secondary{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.36);color:#fff}
.trust-strip{background:#fff;border-bottom:1px solid var(--line)}
.trust{display:grid;gap:18px;grid-template-columns:repeat(4,1fr);margin:auto;max-width:1220px;padding:26px 22px}
.trust strong{color:var(--ink);display:block;font-size:22px}
.trust span{color:var(--muted);font-size:14px}
.section{margin:auto;max-width:1220px;padding:72px 22px}
.section-head{margin-bottom:34px;max-width:820px}
.section h2{color:var(--ink);font-size:38px;line-height:1.16;margin-bottom:12px}
.section-head p{color:var(--muted);font-size:18px}
.grid{display:grid;gap:24px}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-2{grid-template-columns:repeat(2,1fr)}
.card{background:var(--paper);border:1px solid var(--line);border-radius:8px;box-shadow:0 10px 28px rgba(7,26,52,.07);padding:28px}
.card h3{color:var(--ink);font-size:22px;margin-bottom:10px}
.card p{color:var(--muted)}
.card ul{color:var(--muted);margin:16px 0 0 20px}
.card li{margin:8px 0}
.tag{background:var(--mint);border-radius:999px;color:#087170;display:inline-block;font-size:12px;font-weight:800;margin-bottom:16px;padding:7px 11px;text-transform:uppercase}
.service-card{border-top:4px solid var(--blue)}
.service-card:nth-child(2){border-top-color:var(--teal)}
.service-card:nth-child(3){border-top-color:#7b61ff}
.pathway{background:#fff;border:1px solid var(--line);border-radius:8px;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;overflow:hidden}
.pathway div{border-right:1px solid var(--line);padding:24px}
.pathway div:last-child{border-right:none}
.pathway b{color:var(--blue);display:block;font-size:13px;margin-bottom:8px;text-transform:uppercase}
.pathway h3{color:var(--ink);font-size:18px;margin-bottom:8px}
.usecase{align-items:start;background:#fff;border-left:4px solid var(--teal);border-radius:8px;display:grid;gap:14px;grid-template-columns:220px 1fr;padding:22px}
.usecase h3{color:var(--ink);font-size:20px}
.usecase p{color:var(--muted)}
.cta-band{background:var(--ink);color:#fff;margin-top:36px}
.cta-inner{align-items:center;display:flex;gap:28px;justify-content:space-between;margin:auto;max-width:1220px;padding:54px 22px}
.cta-inner h2{font-size:34px;line-height:1.18}
.cta-inner p{margin-top:10px;max-width:700px;opacity:.9}
footer{background:#061326;color:#fff;text-align:center;padding:38px 22px}
footer h2{font-size:28px;margin-bottom:8px}
footer p{opacity:.9}
@media(max-width:900px){
.menu{display:none}
.hero h1{font-size:40px}
.hero p{font-size:18px}
.trust,.grid-3,.grid-2,.pathway{grid-template-columns:1fr}
.pathway div{border-bottom:1px solid var(--line);border-right:none}
.usecase{grid-template-columns:1fr}
.cta-inner{align-items:flex-start;flex-direction:column}
}
</style>
</head>
